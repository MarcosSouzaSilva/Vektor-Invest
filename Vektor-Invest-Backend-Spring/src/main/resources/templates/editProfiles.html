<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e; /* Fundo bem escuro */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #e0e0e0; /* Cor do texto claro */
        }
        .container {
            background-color: #2a2a4a; /* Fundo do container ligeiramente mais claro que o body */
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); /* Sombra mais pronunciada */
            width: 100%;
            max-width: 500px;
            border: 1px solid #3f3f6e; /* Borda sutil para o container */
        }
        h1 {
            text-align: center;
            color: #8be9fd; /* Azul claro para o título */
            margin-bottom: 25px;
            text-shadow: 0 0 5px rgba(139, 233, 253, 0.3); /* Sombra sutil para o título */
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #b3b3e0; /* Azul acinzentado para os labels */
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"] {
            width: calc(100% - 20px);
            padding: 12px;
            border: 1px solid #4a4a7a; /* Borda dos inputs */
            border-radius: 4px;
            font-size: 16px;
            background-color: #3a3a5a; /* Fundo dos inputs */
            color: #ffffff; /* Cor do texto dentro dos inputs */
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="date"]:focus {
            border-color: #00bfff; /* Azul mais vibrante no foco */
            box-shadow: 0 0 8px rgba(0, 191, 255, 0.5); /* Sombra azul no foco */
            outline: none;
        }
        button {
            background-color: #00bfff; /* Azul vibrante para o botão */
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 2px 10px rgba(0, 191, 255, 0.3); /* Sombra azul para o botão */
        }
        button:hover {
            background-color: #009acd; /* Azul um pouco mais escuro no hover */
            transform: translateY(-2px); /* Efeito sutil de levantar */
        }
        .error {
            color: red;
            font-size: 0.9em;
        }
    </style>

</head>

<body>

<div class="container">

    <h1 > Editar Perfil</h1>

    <form id="editProfileForm" th:action="@{/editUser}" method="post" th:object="${usuario}">

        <div class="form-group">
            <label for="name" >Nome:</label>
            <input type="text" th:field="*{name}" id="name" required>
        </div>

        <div class="form-group">
            <label for="date">Data de nascimento:</label>
            <span th:text="${#temporals.format(usuario.birthDate, 'dd/MM/yyyy')}"></span>
            <input type="date" th:field="*{birthDate}">
            <span th:if="${param.error}" class="error"></span>
        </div>

        <button type="submit">Salvar Alterações</button>
    </form>

</div>

</body>
</html>
