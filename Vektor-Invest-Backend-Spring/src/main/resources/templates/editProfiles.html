<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="/css/editProfile.css">
</head>

<body>

<div class="container">

    <h1 > Editar Perfil</h1>

    <form id="editProfileForm" th:action="@{/editUser}" method="post" th:object="${usuario}">

        <div class="form-group">
            <label for="name" >Nome:</label>
            <input type="text" th:field="*{name}" id="name" required>
        </div>

        <div class="form-group">
            <label for="date">Data de nascimento:</label>
            <input type="date" th:field="*{birthDate}" readonly>
        </div>

        <div class="form-group">
            <label for="email">E-mail:</label>
            <div class="locked-field">
                <input type="email" id="email" th:value="${usuario.email}" readonly>
                <link rel="stylesheet"
                      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
            </div>
        </div>

        <div class="form-group">
            <label for="investorType">Tipo de investidor:</label>

            <select id="investorType" th:field="*{investorType}" required>

                <option value="">Selecione seu perfil</option>

                <option th:each="profile : ${T(br.com.vektorinvest.vektorinvestbackendspring.usecases.enums.InvestorType).values()}"
                        th:value="${profile}"
                        th:text="${profile.investorType}">
                </option>

            </select>
        </div>

        <div class="form-group">
            <label for="password">Senha:</label>
            <div class="locked-field">
                <input type="password" id="password" value="********" readonly>
                <span class="lock-icon">🔒</span>
            </div>
        </div>

        <button type="submit">Salvar Alterações</button>
    </form>

</div>

</body>
</html>
