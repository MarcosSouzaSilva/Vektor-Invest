<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard - Vektor Invest Admin</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/admin.css">

    <style>
        :root {
            --primary: #00c896;
            --danger: #ef4444;
            --bg: #0b1220;
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #f8fafc;
            --muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
        }

        .container {
            width: 92%;
            max-width: 1300px;
            margin: auto;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 75px;
        }

        .logo h2 {
            font-weight: 800;
        }

        .accent {
            color: var(--primary);
        }

        .admin-badge {
            font-size: 12px;
            background: rgba(0,200,150,0.15);
            padding: 4px 8px;
            border-radius: 999px;
            margin-left: 8px;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--primary);
            color: black;
        }

        .theme-toggle,
        .logout-btn {
            border: none;
            cursor: pointer;
            padding: 10px 14px;
            border-radius: 10px;
        }

        .theme-toggle {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .logout-btn {
            background: rgba(239,68,68,0.15);
            color: white;
        }

        .logout-btn:hover {
            background: var(--danger);
        }

        /* MAIN */
        .dashboard-main {
            padding: 40px 0;
        }

        .dashboard-header h1 {
            font-size: 34px;
            margin-bottom: 6px;
        }

        .dashboard-header p {
            color: var(--muted);
        }

        /* STATS */
        .stats-grid {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            display: flex;
            gap: 14px;
            transition: .2s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-icon {
            font-size: 26px;
        }

        .stat-content h3 {
            font-size: 22px;
        }

        .stat-content p {
            color: var(--muted);
            font-size: 13px;
        }

        .positive { color: #22c55e; }
        .neutral { color: #f59e0b; }

        /* TABS */
        .dashboard-tabs {
            margin-top: 30px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--primary);
            color: black;
        }

        /* SECTIONS */
        .tab-content {
            margin-top: 20px;
        }

        .users-section,
        .stocks-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            color: var(--muted);
            font-size: 13px;
        }

        tr {
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
        }

        /* STOCKS */
        .stocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }

        .stock-card-admin {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 14px;
        }

        .stock-symbol-admin {
            color: var(--primary);
            font-weight: bold;
        }

        .stock-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-small {
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .edit { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .disable { background: rgba(239,68,68,0.2); color: #ef4444; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            width: 90%;
            max-width: 500px;
            margin: 80px auto;
            background: #111827;
            padding: 20px;
            border-radius: 14px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: white;
        }

    </style>
</head>

<body>

<header class="header">
    <div class="container">
        <div class="nav">

            <div class="logo">
                <h2>Vektor<span class="accent">Invest</span> <span class="admin-badge">ADMIN</span></h2>
            </div>

            <nav class="nav-links">

                <span class="user-info">
                    <span class="user-avatar">👤</span>
                    <span th:text="${name}"></span>
                </span>

                <button class="theme-toggle" onclick="toggleTheme()">☀️</button>

                <form th:action="@{/logout}" method="post">
                    <button class="logout-btn">Sair</button>
                </form>

            </nav>

        </div>
    </div>
</header>

<main class="dashboard-main">
    <div class="container">

        <div class="dashboard-header">
            <h1>Painel de Controle</h1>
            <p>Bem-vindo ao sistema administrativo</p>
        </div>

        <!-- STATS -->
        <div class="stats-grid">

            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div>
                    <h3 th:text="${analyseStocks}"></h3>
                    <p>Análises</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div>
                    <h3 th:text="${usersActive}"></h3>
                    <p>Usuários ativos</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div>
                    <h3 th:text="${stocksMoreAnalysed}"></h3>
                    <p>Ação mais analisada</p>
                </div>
            </div>

        </div>

        <!-- TABS -->
        <div class="dashboard-tabs">

            <div class="tab-buttons">
                <button class="tab-btn active">Analytics</button>
                <button class="tab-btn">Usuários</button>
                <button class="tab-btn">Ações</button>
            </div>

        </div>

        <!-- USERS -->
        <div class="tab-content users-section">

            <div class="section-header">
                <h3>Usuários</h3>
            </div>

            <table>
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Tipo</th>
                    <th>Status</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="user : ${allUsers}">
                    <td th:text="${user.name}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.role}"></td>
                    <td th:text="${user.enabled} ? 'Ativo' : 'Inativo'"></td>
                </tr>
                </tbody>
            </table>

        </div>

        <!-- STOCKS -->
        <div class="tab-content stocks-section">

            <div class="section-header">
                <h3>Ações</h3>
                <button class="btn-primary">+ Nova ação</button>
            </div>

            <div class="stocks-grid">

                <div class="stock-card-admin" th:each="stock : ${allStocks}">
                    <div class="stock-symbol-admin" th:text="${stock.stockCode}"></div>
                    <p th:text="${stock.companyName}"></p>

                    <div class="stock-actions">
                        <button class="btn-small edit">Editar</button>
                        <button class="btn-small disable">Excluir</button>
                    </div>
                </div>

            </div>

        </div>

    </div>
</main>

<script src="/js/script.js"></script>
<script src="/js/admin.js"></script>

</body>
</html>
